<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pet-container">
        <h1>My Digital Pet</h1>
        <div class="pet-display">
            <div class="pet" id="pet">🙂</div>
            <p id="pet-name">Fluffy</p>
        </div>
        
        <div class="stats">
            <p>Hunger: <span id="hunger-level">50</span>/100</p>
            <p>Happiness: <span id="happiness-level">50</span>/100</p>
            <p>Energy: <span id="energy-level">50</span>/100</p>
        </div>
        
        <div class="buttons">
            <button id="feed-btn">🍎 Feed Pet</button>
            <button id="play-btn">🎾 Play</button>
            <button id="sleep-btn">😴 Sleep</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
